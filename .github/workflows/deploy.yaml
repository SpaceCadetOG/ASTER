name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key (add to known_hosts)
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 34.57.124.217 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "Known hosts added:"
          cat ~/.ssh/known_hosts

      - name: Connectivity check (verbose)
        run: |
          ssh -v -o IdentitiesOnly=yes -p 22 \
            vic6709@34.57.124.217 'echo "✅ Connected from GitHub Actions"; whoami; uname -a'