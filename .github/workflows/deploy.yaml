name: CI/CD - ASTER Build, Test, Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'

      - name: Build linux/amd64 binaries
        run: |
          # repo root: ASTER
          # go.mod: module go-machine
          mkdir -p go-machine/dist

          # long
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" \
            -o go-machine/dist/go-machine-long ./cmd/long

          # short
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" \
            -o go-machine/dist/go-machine-short ./cmd/short

          # OPTIONAL: rr
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" \
            -o go-machine/dist/go-machine-rr ./cmd/rr || true

          # OPTIONAL: backtest
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" \
            -o go-machine/dist/go-machine-backtest ./cmd/backtest || true

          ls -l go-machine/dist

      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: go-machine/dist/*

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: dist

      # 🔐 decode key (SSH_KEY_B64) and unlock with SSH_PW ("go")
      - name: Prepare SSH key (decode & remove passphrase)
        run: |
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > key.pem
          chmod 600 key.pem
          # your passphrase secret is SSH_PW
          ssh-keygen -p \
            -P "${{ secrets.SSH_PW }}" \
            -N "" \
            -f key.pem

      - name: Upload binaries via scp (to ASTER dir, as .new)
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /home/${{ secrets.SSH_USER }}/ASTER/go-machine"

          scp -i key.pem -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            dist/go-machine-long \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/ASTER/go-machine/go-machine-long.new"

          scp -i key.pem -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            dist/go-machine-short \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/ASTER/go-machine/go-machine-short.new"

      - name: Atomic swap & restart ASTER services
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
              set -e
              cd /home/'"${{ secrets.SSH_USER }}"'/ASTER/go-machine

              # keep previous versions
              [ -f go-machine-long ]  && cp go-machine-long  go-machine-long.prev  || true
              [ -f go-machine-short ] && cp go-machine-short go-machine-short.prev || true

              # swap in new
              mv go-machine-long.new  go-machine-long
              mv go-machine-short.new go-machine-short

              chmod +x go-machine-long go-machine-short

              # restart ASTER units (the ones you just made)
              sudo systemctl restart aster.service || true
              sudo systemctl restart aster-short.service || true

              # optional health checks on 8090/8091 (won't fail pipeline hard)
              curl -fsS http://127.0.0.1:8090/health && echo "ASTER long healthy ✅"  || echo "ASTER long health FAIL ❌"
              curl -fsS http://127.0.0.1:8091/health && echo "ASTER short healthy ✅" || echo "ASTER short health FAIL ❌"
            '